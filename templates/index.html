                    spa: Math.ceil(enemyBaseAttrs.spa * (1 + enemyMagicAtkBoost)),
                    spd: Math.ceil(enemyBaseAttrs.spd * (1 + enemyMagicDefBoost)),
                    spe: Math.ceil(enemyBaseAttrs.spe * (1 + enemySpeedBoost))
                };

                displayAttributes('enemy', enemyDisplayAttrs);
            }
        }
        
        // 点击外部关闭下拉菜单
        document.addEventListener('click', function(event) {
            const allDropdowns = document.querySelectorAll('[id$="-dropdown1"], [id$="-dropdown2"], [id$="-dropdown3"]');
            const allButtons = document.querySelectorAll('[onclick^="toggleIvDropdown"]');
            
            let clickedInside = false;
            allButtons.forEach(button => {
                if (button.contains(event.target)) {
                    clickedInside = true;
                }
            });
            
            allDropdowns.forEach(dropdown => {
                if (dropdown.contains(event.target)) {
                    clickedInside = true;
                }
            });
            
            if (!clickedInside) {
                allDropdowns.forEach(dropdown => {
                    dropdown.classList.add('hidden');
                });
            }
        });
        
        // 宠物过滤功能
        let currentFilterSide = '';
        let allPets = [];
        let filteredPets = [];
        let currentPage = 1;
        const petsPerPage = 50;
        
        // 加载所有宠物数据
        function loadAllPets() {
            return new Promise((resolve) => {
                fetch('/api/pets')
                    .then(response => response.json())
                    .then(data => {
                        allPets = data;
                        filteredPets = data;
                        resolve(data);
                    });
            });
        }
        
        // 生成属性过滤选项
        function generateAttrFilterOptions() {
            const container = document.getElementById('attr-filter-container');
            if (container) {
                container.innerHTML = '';
                Object.entries(attrMap).forEach(([id, name]) => {
                    const button = document.createElement('button');
                    button.className = 'attr-filter-btn px-3 py-2 border border-gray-300 rounded-md hover:bg-gray-100 transition-colors';
                    button.textContent = name;
                    button.dataset.value = id;
                    button.addEventListener('click', function() {
                        this.classList.toggle('bg-primary');
                        this.classList.toggle('text-white');
                        this.classList.toggle('border-primary');
                        applyFilter();
                    });
                    container.appendChild(button);
                });
            }
        }
        
        // 打开过滤模态框
        function openFilterModal(side) {
            currentFilterSide = side;
            document.getElementById('filter-side-label').textContent = side === 'my' ? '我方' : '敌方';
            currentPage = 1;
            applyFilter();
            document.getElementById('pet-filter-modal').classList.remove('hidden');
        }
        
        // 关闭过滤模态框
        function closeFilterModal() {
            document.getElementById('pet-filter-modal').classList.add('hidden');
        }
        
        // 应用过滤
        function applyFilter() {
            // 获取选择的属性
            const selectedAttrs = [];
            document.querySelectorAll('.attr-filter-btn.bg-primary').forEach(button => {
                selectedAttrs.push(button.dataset.value);
            });
            
            // 获取属性值过滤条件
            const statFilters = [];
            const stats = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
            stats.forEach(stat => {
                const value = parseInt(document.getElementById(`filter-${stat}-value`).value) || 0;
                const operator = document.getElementById(`filter-${stat}-operator`).value;
                statFilters.push({ stat, value, operator });
            });
            
            // 过滤宠物
            filteredPets = allPets.filter(pet => {
                // 检查属性过滤
                if (selectedAttrs.length > 0) {
                    const petAttrs = [String(pet.attr1)];
                    if (pet.attr2) {
                        petAttrs.push(String(pet.attr2));
                    }
                    // 所有选择的属性都必须在宠物属性中
                    const hasAllAttrs = selectedAttrs.every(attr => petAttrs.includes(attr));
                    if (!hasAllAttrs) {
                        return false;
                    }
                }
                
                // 检查属性值过滤
                for (const filter of statFilters) {
                    // 只有当值大于0时才进行过滤
                    if (filter.value > 0) {
                        const petValue = pet.race[filter.stat];
                        switch (filter.operator) {
                            case 'gte':
                                if (petValue < filter.value) return false;
                                break;
                            case 'lte':
                                if (petValue > filter.value) return false;
                                break;
                            case 'eq':
                                if (petValue !== filter.value) return false;
                                break;
                        }
                    }
                }
                
                return true;
            });
            
            // 重置到第一页
            currentPage = 1;
            
            // 更新宠物列表显示
            updatePetFilterList();
        }
        
        // 更新宠物列表显示
        function updatePetFilterList() {
            const listContainer = document.getElementById('pet-filter-list');
            const resultCount = document.getElementById('filter-result-count');
            const currentPageSpan = document.getElementById('filter-current-page');
            const totalPagesSpan = document.getElementById('filter-total-pages');
            const prevBtn = document.getElementById('filter-prev-btn');
            const nextBtn = document.getElementById('filter-next-btn');
            
            // 更新结果数量
            resultCount.textContent = filteredPets.length;
            
            // 计算总页数
            const totalPages = Math.ceil(filteredPets.length / petsPerPage);
            totalPagesSpan.textContent = totalPages || 1;
            currentPageSpan.textContent = currentPage;
            
            // 更新分页按钮状态
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
            
            // 清空列表
            listContainer.innerHTML = '';
            
            if (filteredPets.length === 0) {
                listContainer.innerHTML = '<div class="p-4 text-center text-gray-500">没有符合条件的宠物</div>';
                return;
            }
            
            // 计算当前页的宠物范围
            const startIndex = (currentPage - 1) * petsPerPage;
            const endIndex = Math.min(startIndex + petsPerPage, filteredPets.length);
            const currentPets = filteredPets.slice(startIndex, endIndex);
            
            // 添加宠物到列表
            currentPets.forEach(pet => {
                const petDiv = document.createElement('div');
                petDiv.className = 'p-3 hover:bg-gray-50 cursor-pointer flex justify-between items-center';
                petDiv.innerHTML = `
                    <div>
                        <div class="font-medium">${pet.name}</div>
                        <div class="text-sm text-gray-500">
                            ${attrMap[pet.attr1]}${pet.attr2 ? ' / ' + attrMap[pet.attr2] : ''} | 
                            HP:${pet.race.hp} ATK:${pet.race.atk} DEF:${pet.race.def} SPA:${pet.race.spa} SPD:${pet.race.spd} SPE:${pet.race.spe}
                        </div>
                    </div>
                    <div class="text-primary">选择</div>
                `;
                petDiv.addEventListener('click', function() {
                    selectPet(pet, currentFilterSide);
                    closeFilterModal();
                });
                listContainer.appendChild(petDiv);
            });
        }
        
        // 获取弱点箭头图标
        function getWeaknessArrow(multiplier) {
            if (multiplier === 0.25) {
                return '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block mx-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block mx-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>';
            } else if (multiplier === 0.5) {
                return '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block mx-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>';
            } else if (multiplier === 2) {
                return '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block mx-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" /></svg>';
            } else if (multiplier === 3) {
                return '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block mx-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" /></svg><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block mx-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" /></svg>';
            }
            return '';
        }
        
        // 技能类型映射
        const skillTypes = {
            "1": "物攻",
            "2": "魔攻",
            "3": "防御",
            "4": "状态"
        };
        
        // 选择宠物
        function selectPet(pet, side) {
            if (side === 'my') {
                myPet = pet;
                // 重置我方血量数据
                hpData.my.current = 0;
                hpData.my.initial = 0;
                openSkillConfigModal(pet, 'my');
                // 重新加载敌方技能以更新箭头
                if (enemyPet) {
                    loadPetSkills(enemyPet.pet_id, 'enemy');
                }
            } else {
                enemyPet = pet;
                // 重置敌方血量数据
                hpData.enemy.current = 0;
                hpData.enemy.initial = 0;
                openSkillConfigModal(pet, 'enemy');
                // 重新加载我方技能以更新箭头
                if (myPet) {
                    loadPetSkills(myPet.pet_id, 'my');
                }
            }
            loadPetInfo(pet, side);
        }
        
        // 加载宠物信息
        function loadPetInfo(pet, side) {
            const infoDiv = document.getElementById(`${side}-pet-info`);
            const nameElement = infoDiv.querySelector('h4');
            const attr1Element = document.getElementById(`${side}-attr1`);
            const attr2Element = document.getElementById(`${side}-attr2`);
            const hpElement = document.getElementById(`${side}-hp`);
            const atkElement = document.getElementById(`${side}-atk`);
            const defElement = document.getElementById(`${side}-def`);
            const spaElement = document.getElementById(`${side}-spa`);
            const spdElement = document.getElementById(`${side}-spd`);
            const speElement = document.getElementById(`${side}-spe`);
            
            nameElement.textContent = pet.name;
            attr1Element.textContent = attrMap[pet.attr1];
            attr2Element.textContent = pet.attr2 ? attrMap[pet.attr2] : '无';
            hpElement.textContent = pet.race.hp;
            atkElement.textContent = pet.race.atk;
            defElement.textContent = pet.race.def;
            spaElement.textContent = pet.race.spa;
            spdElement.textContent = pet.race.spd;
            speElement.textContent = pet.race.spe;
            
            infoDiv.classList.remove('hidden');
        }
        
        // 清除所有过滤
        function clearAllFilters() {
            // 清除属性过滤
            document.querySelectorAll('.attr-filter-btn').forEach(button => {
                button.classList.remove('bg-primary', 'text-white', 'border-primary');
            });
            
            // 清除属性值过滤
            const stats = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
            stats.forEach(stat => {
                document.getElementById(`filter-${stat}-value`).value = 0;
                document.getElementById(`filter-${stat}-operator`).value = 'gte';
            });
            
            // 应用过滤
            applyFilter();
        }
        
        // 设置事件监听器
        document.addEventListener('DOMContentLoaded', function() {
            // 加载所有宠物数据
            loadAllPets();
            
            // 生成属性过滤选项
            generateAttrFilterOptions();
            
            // 我方宠物过滤按钮
            document.getElementById('my-pet-filter-btn').addEventListener('click', function() {
                openFilterModal('my');
            });
            
            // 敌方宠物过滤按钮
            document.getElementById('enemy-pet-filter-btn').addEventListener('click', function() {
                openFilterModal('enemy');
            });
            
            // 清除所有过滤按钮
            document.getElementById('clear-filter-btn').addEventListener('click', clearAllFilters);
            
            // 关闭模态框按钮
            document.getElementById('close-filter-modal').addEventListener('click', closeFilterModal);
            
            // 点击模态框外部关闭
            document.getElementById('pet-filter-modal').addEventListener('click', function(event) {
                if (event.target === this) {
                    closeFilterModal();
                }
            });
            
            // 分页按钮
            document.getElementById('filter-prev-btn').addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage--;
                    updatePetFilterList();
                }
            });
            
            document.getElementById('filter-next-btn').addEventListener('click', function() {
                const totalPages = Math.ceil(filteredPets.length / petsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    updatePetFilterList();
                }
            });
            
            // 属性值过滤实时更新
            const stats = ['hp', 'atk', 'def', 'spa', 'spd', 'spe'];
            stats.forEach(stat => {
                // 数值输入框
                const valueInput = document.getElementById(`filter-${stat}-value`);
                if (valueInput) {
                    valueInput.addEventListener('input', applyFilter);
                }
                // 运算符选择器
                const operatorSelect = document.getElementById(`filter-${stat}-operator`);
                if (operatorSelect) {
                    operatorSelect.addEventListener('change', applyFilter);
                }
            });
        });
    </script>
    
    <!-- 宠物过滤模态框 -->
    <div id="pet-filter-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold text-gray-800">宠物过滤 - <span id="filter-side-label"></span></h3>
                <button type="button" id="close-filter-modal" class="text-gray-500 hover:text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <!-- 属性过滤 -->
            <div class="mb-4">
                <h4 class="text-lg font-medium text-gray-700 mb-2">系别选择</h4>
                <div class="grid grid-cols-3 sm:grid-cols-6 md:grid-cols-9 gap-2" id="attr-filter-container">
                </div>
            </div>
            
            <!-- 属性值过滤 -->
            <div class="mb-4">
                <h4 class="text-lg font-medium text-gray-700 mb-2">属性值过滤</h4>
                <div class="flex flex-wrap gap-4">
                    <div class="flex flex-col items-center gap-1">
                        <label class="text-sm font-medium text-gray-700">HP</label>
                        <input type="number" id="filter-hp-value" min="0" value="0" class="w-16 p-1 border border-gray-300 rounded-md text-center">
                        <select id="filter-hp-operator" class="w-24 p-1 border border-gray-300 rounded-md text-xs">
                            <option value="gte">≥</option>
                            <option value="lte">≤</option>
                            <option value="eq">=</option>
                        </select>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <label class="text-sm font-medium text-gray-700">ATK</label>
                        <input type="number" id="filter-atk-value" min="0" value="0" class="w-16 p-1 border border-gray-300 rounded-md text-center">
                        <select id="filter-atk-operator" class="w-24 p-1 border border-gray-300 rounded-md text-xs">
                            <option value="gte">≥</option>
                            <option value="lte">≤</option>
                            <option value="eq">=</option>
                        </select>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <label class="text-sm font-medium text-gray-700">DEF</label>
                        <input type="number" id="filter-def-value" min="0" value="0" class="w-16 p-1 border border-gray-300 rounded-md text-center">
                        <select id="filter-def-operator" class="w-24 p-1 border border-gray-300 rounded-md text-xs">
                            <option value="gte">≥</option>
                            <option value="lte">≤</option>
                            <option value="eq">=</option>
                        </select>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <label class="text-sm font-medium text-gray-700">SPA</label>
                        <input type="number" id="filter-spa-value" min="0" value="0" class="w-16 p-1 border border-gray-300 rounded-md text-center">
                        <select id="filter-spa-operator" class="w-24 p-1 border border-gray-300 rounded-md text-xs">
                            <option value="gte">≥</option>
                            <option value="lte">≤</option>
                            <option value="eq">=</option>
                        </select>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <label class="text-sm font-medium text-gray-700">SPD</label>
                        <input type="number" id="filter-spd-value" min="0" value="0" class="w-16 p-1 border border-gray-300 rounded-md text-center">
                        <select id="filter-spd-operator" class="w-24 p-1 border border-gray-300 rounded-md text-xs">
                            <option value="gte">≥</option>
                            <option value="lte">≤</option>
                            <option value="eq">=</option>
                        </select>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <label class="text-sm font-medium text-gray-700">SPE</label>
                        <input type="number" id="filter-spe-value" min="0" value="0" class="w-16 p-1 border border-gray-300 rounded-md text-center">
                        <select id="filter-spe-operator" class="w-24 p-1 border border-gray-300 rounded-md text-xs">
                            <option value="gte">≥</option>
                            <option value="lte">≤</option>
                            <option value="eq">=</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- 按钮区域 -->
            <div class="flex justify-between items-center mb-4">
                <div class="text-sm text-gray-600">
                    共 <span id="filter-result-count">0</span> 个宠物
                </div>
                <button type="button" id="clear-filter-btn" class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-100">
                    清除所有
                </button>
            </div>
            
            <!-- 宠物列表 -->
            <div class="flex-1 overflow-y-auto border border-gray-200 rounded-md">
                <div id="pet-filter-list" class="divide-y divide-gray-200">
                </div>
            </div>
            
            <!-- 分页 -->
            <div class="flex justify-center items-center gap-2 mt-4">
                <button type="button" id="filter-prev-btn" class="px-3 py-1 border border-gray-300 rounded-md hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                    上一页
                </button>
                <span class="text-sm text-gray-600">
                    第 <span id="filter-current-page">1</span> / <span id="filter-total-pages">1</span> 页
                </span>
                <button type="button" id="filter-next-btn" class="px-3 py-1 border border-gray-300 rounded-md hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed">
                    下一页
                </button>
            </div>
        </div>
    </div>
    
    <!-- 技能配置模态框 -->
    <div id="skill-config-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-5xl max-h-[90vh] overflow-hidden flex flex-col">

                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />

            <!-- 筛选区域 -->

                        <input type="range" id="skill-power-filter" min="0" max="100" value="100" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>
            
            <!-- 技能列表区域 -->
            <div class="flex-1 overflow-y-auto border border-gray-200 rounded-md">
                <div id="skill-list-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 p-4">
                    <!-- 技能卡片将在这里显示 -->
                </div>
            </div>
        </div>
    </div>
</body>
