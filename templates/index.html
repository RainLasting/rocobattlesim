<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对战模拟器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        accent: '#f59e0b',
                        danger: '#ef4444',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .dropdown-up {
                position: absolute;
                bottom: 100%;
                top: auto;
                margin-top: 0;
                margin-bottom: 4px;
            }
            .dropdown-left {
                left: auto;
                right: 0;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">对战模拟器</h1>
        
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- 左侧：我方精灵信息 -->
            <div class="w-full lg:w-[28.57%] bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">我方精灵</h2>
                
                <div class="mb-6">
                    <h3 class="text-lg font-medium text-gray-600 mb-2">宠物选择</h3>
                    <div class="flex gap-2">
                        <button type="button" id="my-pet-filter-btn" class="flex-1 bg-primary text-white px-3 py-2 rounded-md hover:bg-blue-600 transition-colors">
                            选择宠物
                        </button>
                    </div>
                    <div id="my-pet-info" class="mt-4 p-3 bg-gray-50 rounded-md hidden">
                        <h4 class="font-medium text-gray-700"></h4>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <div>属性1: <span id="my-attr1"></span></div>
                            <div>属性2: <span id="my-attr2"></span></div>
                            <div>HP: <span id="my-hp"></span></div>
                            <div>攻击: <span id="my-atk"></span></div>
                            <div>防御: <span id="my-def"></span></div>
                            <div>特攻: <span id="my-spa"></span></div>
                            <div>特防: <span id="my-spd"></span></div>
                            <div>速度: <span id="my-spe"></span></div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-200">
                            <h5 class="font-medium text-gray-700 mb-2">计算后属性</h5>
                            <div id="my-attributes" class="hidden"></div>
                        </div>
                    </div>
                </div>
                
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-lg font-medium text-gray-600">技能选择</h3>
                        <button type="button" id="my-reselect-skills" class="text-sm text-primary hover:underline">
                            重新选择
                        </button>
                    </div>
                    <div id="my-skills"></div>
                </div>
                
                <div>
                    <h3 class="text-lg font-medium text-gray-600 mb-2">修正系统</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">增益修正</label>
                            <select id="my-boost" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="0">无</option>
                                <option value="hp">HP</option>
                                <option value="atk">攻击</option>
                                <option value="def">防御</option>
                                <option value="spa">特攻</option>
                                <option value="spd">特防</option>
                                <option value="spe">速度</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">减益修正</label>
                            <select id="my-reduction" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="0">无</option>
                                <option value="hp">HP</option>
                                <option value="atk">攻击</option>
                                <option value="def">防御</option>
                                <option value="spa">特攻</option>
                                <option value="spd">特防</option>
                                <option value="spe">速度</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">个体值选择</label>
                            <div class="space-y-2">
                                <div class="flex items-center gap-2">
                                    <select id="my-iv-attr1" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="hp">HP</option>
                                        <option value="atk">攻击</option>
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('my-iv-dropdown1')">
                                                <span id="my-iv-value1">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="my-iv-dropdown1" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="my-iv-dropdown1-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select id="my-iv-attr2" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="atk">攻击</option>
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                        <option value="hp">HP</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('my-iv-dropdown2')">
                                                <span id="my-iv-value2">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="my-iv-dropdown2" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="my-iv-dropdown2-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select id="my-iv-attr3" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                        <option value="hp">HP</option>
                                        <option value="atk">攻击</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('my-iv-dropdown3')">
                                                <span id="my-iv-value3">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="my-iv-dropdown3" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="my-iv-dropdown3-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 中间：战斗计算和结果显示 -->
            <div class="w-full lg:w-[42.86%] bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">战斗计算</h2>

                <div class="grid grid-cols-2 gap-6 mb-6">
                    <!-- 我方战斗参数 -->
                    <div>
                        <h3 class="text-lg font-medium text-primary mb-3">我方参数</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">应对倍率</label>
                                <input type="number" id="my-response-multiplier" min="0" step="0.1" value="1" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">威力加成（数值）</label>
                                <input type="number" id="my-power-bonus" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">威力提升（百分比）</label>
                                <input type="number" id="my-power-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">减伤</label>
                                <input type="number" id="my-damage-reduction" min="0" max="1" step="0.1" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">天气影响</label>
                                <input type="number" id="my-weather-effect" min="0" step="0.1" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                        </div>
                    </div>

                    <!-- 敌方战斗参数 -->
                    <div>
                        <h3 class="text-lg font-medium text-danger mb-3">敌方参数</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">应对倍率</label>
                                <input type="number" id="enemy-response-multiplier" min="0" step="0.1" value="1" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">威力加成（数值）</label>
                                <input type="number" id="enemy-power-bonus" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">威力提升（百分比）</label>
                                <input type="number" id="enemy-power-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">减伤</label>
                                <input type="number" id="enemy-damage-reduction" min="0" max="1" step="0.1" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">天气影响</label>
                                <input type="number" id="enemy-weather-effect" min="0" step="0.1" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 能力等级设置 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium text-gray-600 mb-3">能力等级</h3>
                    <div class="grid grid-cols-2 gap-6">
                        <!-- 我方能力等级 -->
                        <div>
                            <h4 class="text-sm font-medium text-primary mb-2">我方能力提升</h4>
                            <div class="space-y-2">
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">物理攻击 (±%)</label>
                                    <input type="number" id="my-phys-atk-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">魔法攻击 (±%)</label>
                                    <input type="number" id="my-magic-atk-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">物理防御 (±%)</label>
                                    <input type="number" id="my-phys-def-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">魔法防御 (±%)</label>
                                    <input type="number" id="my-magic-def-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">速度 (±%)</label>
                                    <input type="number" id="my-speed-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                            </div>
                        </div>

                        <!-- 敌方能力等级 -->
                        <div>
                            <h4 class="text-sm font-medium text-danger mb-2">敌方能力提升</h4>
                            <div class="space-y-2">
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">物理攻击 (±%)</label>
                                    <input type="number" id="enemy-phys-atk-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">魔法攻击 (±%)</label>
                                    <input type="number" id="enemy-magic-atk-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">物理防御 (±%)</label>
                                    <input type="number" id="enemy-phys-def-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">魔法防御 (±%)</label>
                                    <input type="number" id="enemy-magic-def-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">速度 (±%)</label>
                                    <input type="number" id="enemy-speed-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-center mb-6">
                    <button id="calculate-btn" class="bg-primary text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors">计算伤害</button>
                </div>
                
                <h2 class="text-xl font-semibold text-gray-700 mb-4">计算结果</h2>
                
                <div id="result" class="p-4 bg-gray-50 rounded-md hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <h3 class="font-medium text-gray-700 mb-2">我方攻击敌方</h3>
                            <div class="space-y-2">
                                <div>技能: <span id="my-skill-name"></span></div>
                                <div>伤害: <span id="my-damage" class="font-bold text-primary"></span></div>
                                <div>需要攻击次数: <span id="my-hit-count" class="font-bold text-primary"></span></div>
                            </div>
                        </div>
                        <div>
                            <h3 class="font-medium text-gray-700 mb-2">敌方攻击我方</h3>
                            <div class="space-y-2">
                                <div>技能: <span id="enemy-skill-name"></span></div>
                                <div>伤害: <span id="enemy-damage" class="font-bold text-danger"></span></div>
                                <div>需要攻击次数: <span id="enemy-hit-count" class="font-bold text-danger"></span></div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-center">
                        <button id="next-turn-btn" class="bg-accent text-white px-6 py-2 rounded-md hover:bg-amber-600 transition-colors">下一回合</button>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：敌方精灵信息 -->
            <div class="w-full lg:w-[28.57%] bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">敌方精灵</h2>
                
                <div class="mb-6">
                    <h3 class="text-lg font-medium text-gray-600 mb-2">宠物选择</h3>
                    <div class="flex gap-2">
                        <button type="button" id="enemy-pet-filter-btn" class="flex-1 bg-danger text-white px-3 py-2 rounded-md hover:bg-red-600 transition-colors">
                            选择宠物
                        </button>
                    </div>
                    <div id="enemy-pet-info" class="mt-4 p-3 bg-gray-50 rounded-md hidden">
                        <h4 class="font-medium text-gray-700"></h4>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <div>属性1: <span id="enemy-attr1"></span></div>
                            <div>属性2: <span id="enemy-attr2"></span></div>
                            <div>HP: <span id="enemy-hp"></span></div>
                            <div>攻击: <span id="enemy-atk"></span></div>
                            <div>防御: <span id="enemy-def"></span></div>
                            <div>特攻: <span id="enemy-spa"></span></div>
                            <div>特防: <span id="enemy-spd"></span></div>
                            <div>速度: <span id="enemy-spe"></span></div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-200">
                            <h5 class="font-medium text-gray-700 mb-2">计算后属性</h5>
                            <div id="enemy-attributes" class="hidden"></div>
                        </div>
                    </div>
                </div>
                
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-lg font-medium text-gray-600">技能选择</h3>
                        <button type="button" id="enemy-reselect-skills" class="text-sm text-primary hover:underline">
                            重新选择
                        </button>
                    </div>
                    <div id="enemy-skills"></div>
                </div>
                
                <div>
                    <h3 class="text-lg font-medium text-gray-600 mb-2">修正系统</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">增益修正</label>
                            <select id="enemy-boost" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="0">无</option>
                                <option value="hp">HP</option>
                                <option value="atk">攻击</option>
                                <option value="def">防御</option>
                                <option value="spa">特攻</option>
                                <option value="spd">特防</option>
                                <option value="spe">速度</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">减益修正</label>
                            <select id="enemy-reduction" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="0">无</option>
                                <option value="hp">HP</option>
                                <option value="atk">攻击</option>
                                <option value="def">防御</option>
                                <option value="spa">特攻</option>
                                <option value="spd">特防</option>
                                <option value="spe">速度</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">个体值选择</label>
                            <div class="space-y-2">
                                <div class="flex items-center gap-2">
                                    <select id="enemy-iv-attr1" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="hp">HP</option>
                                        <option value="atk">攻击</option>
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('enemy-iv-dropdown1')">
                                                <span id="enemy-iv-value1">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="enemy-iv-dropdown1" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="enemy-iv-dropdown1-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select id="enemy-iv-attr2" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="atk">攻击</option>
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                        <option value="hp">HP</option>
                                    </select>

        // 全局变量

        // 技能配置相关变量
        let currentSkillConfigPet = null;
        let currentSkillConfigSide = '';

        let allSkills = [];
        
        // 打开技能配置模态框
        function openSkillConfigModal(pet, side) {
            currentSkillConfigPet = pet;
            currentSkillConfigSide = side;
            selectedSkills = [];
            
            // 加载宠物技能
            loadAllSkillsForConfig(pet.pet_id);
            
            // 设置模态框标题
            document.getElementById('skill-config-side').textContent = side === 'my' ? '我方' : '敌方';
            
            // 显示模态框
            document.getElementById('skill-config-modal').classList.remove('hidden');
        }
        
        // 关闭技能配置模态框
        function closeSkillConfigModal() {
            document.getElementById('skill-config-modal').classList.add('hidden');
        }
        
        // 加载宠物所有技能
        function loadAllSkillsForConfig(petId) {
            fetch(`/api/skills/${petId}`)
                .then(response => response.json())
                .then(skills => {
                    allSkills = skills;
                    filterAndDisplaySkills();
                    updateSelectedSkillsDisplay();
                });
        }
        
        // 筛选并显示技能
        function filterAndDisplaySkills() {
            const typeFilter = document.getElementById('skill-type-filter').value;
            const powerFilter = parseInt(document.getElementById('skill-power-filter').value);
            
            // 筛选技能
            const filteredSkills = allSkills.filter(skill => {
                // 类型筛选
                if (typeFilter !== '0' && String(skill.type_id) !== typeFilter) {
                    return false;
                }
                // 威力筛选
                if (skill.power > powerFilter) {
                    return false;
                }
                return true;
            });
            
            // 显示技能
            const container = document.getElementById('skill-list-container');
            container.innerHTML = '';
            
            filteredSkills.forEach(skill => {
                const isSelected = selectedSkills.some(s => s.skill_id === skill.skill_id);
                const isDisabled = selectedSkills.length >= 4 && !isSelected;
                
                const skillCard = document.createElement('div');
                skillCard.className = `p-3 border rounded-md transition-all duration-200 ${isSelected ? 'bg-blue-50 border-blue-300' : 'border-gray-200 hover:bg-gray-50'} ${isDisabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}`;
                
                skillCard.innerHTML = `
                    <div class="font-medium">${skill.name}</div>
                    <div class="text-sm text-gray-600">类型: ${skillTypes[skill.type_id]} | 威力: ${skill.power}</div>
                    <div class="text-sm text-gray-600">属性: ${attrMap[skill.attr_id]}</div>
                    <div class="text-xs text-gray-500 mt-1">${skill.desc}</div>
                    ${isSelected ? '<div class="mt-2 text-xs text-blue-600 font-medium">已选择</div>' : ''}
                `;
                
                if (!isDisabled) {
                    skillCard.addEventListener('click', function() {
                        toggleSkillSelection(skill);
                    });
                }
                
                container.appendChild(skillCard);
            });
        }
        
        // 切换技能选择状态
        function toggleSkillSelection(skill) {
            const index = selectedSkills.findIndex(s => s.skill_id === skill.skill_id);
            
            if (index > -1) {
                // 取消选择
                selectedSkills.splice(index, 1);
            } else {
                // 选择技能（最多4个）
                if (selectedSkills.length < 4) {
                    selectedSkills.push(skill);
                }
            }
            
            // 更新显示
            filterAndDisplaySkills();
            updateSelectedSkillsDisplay();
        }
        
        // 更新已选技能显示
        function updateSelectedSkillsDisplay() {
            const container = document.getElementById('selected-skills-container');
            container.innerHTML = '';
            
            if (selectedSkills.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-4">还未选择技能</div>';
                return;
            }
            
            selectedSkills.forEach(skill => {
                const skillCard = document.createElement('div');
                skillCard.className = 'p-3 border border-blue-200 bg-blue-50 rounded-md relative';
                
                skillCard.innerHTML = `
                    <button type="button" class="absolute top-2 right-2 text-red-500 hover:text-red-700">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    <div class="font-medium">${skill.name}</div>
                    <div class="text-sm text-gray-600">类型: ${skillTypes[skill.type_id]}</div>
                    <div class="text-sm text-gray-600">威力: ${skill.power}</div>
                `;
                
                // 添加取消选择事件
                const removeBtn = skillCard.querySelector('button');
                removeBtn.addEventListener('click', function() {
                    toggleSkillSelection(skill);
                });
                
                container.appendChild(skillCard);
            });
        }
        
        // 确认技能选择
        function confirmSkillSelection() {
            if (selectedSkills.length === 0) {
                alert('请至少选择一个技能');
                return;
            }
            
            // 加载选中的技能
            if (currentSkillConfigSide === 'my') {
                mySkills = selectedSkills;
                loadPetSkills(currentSkillConfigPet.pet_id, 'my');
            } else {
                enemySkills = selectedSkills;
                loadPetSkills(currentSkillConfigPet.pet_id, 'enemy');
            }
            
            // 关闭模态框
            closeSkillConfigModal();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            generateIvDropdownOptions();
            
            // 技能配置模态框事件
            document.getElementById('close-skill-config-modal').addEventListener('click', closeSkillConfigModal);
            document.getElementById('confirm-skills-btn').addEventListener('click', confirmSkillSelection);
            
            // 技能筛选事件
            document.getElementById('skill-type-filter').addEventListener('change', filterAndDisplaySkills);
            document.getElementById('skill-power-filter').addEventListener('input', function() {
                document.getElementById('power-range-value').textContent = `0-${this.value}`;
                filterAndDisplaySkills();
            });
            
            // 点击模态框外部关闭
            document.getElementById('skill-config-modal').addEventListener('click', function(event) {
                if (event.target === this) {
                    closeSkillConfigModal();
                }
            });
        });
        
        // 下一回合按钮点击事件
        function handleNextTurn() {
            // 获取当前伤害值
            const myDamage = parseFloat(document.getElementById('my-damage').textContent) || 0;
            const enemyDamage = parseFloat(document.getElementById('enemy-damage').textContent) || 0;
            
            // 更新血量
            hpData.enemy.current = Math.max(0, hpData.enemy.current - myDamage);
            hpData.my.current = Math.max(0, hpData.my.current - enemyDamage);
            
            // 重新计算并显示属性
            calculateRealTimeAttributes();
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 计算按钮
            document.getElementById('calculate-btn').addEventListener('click', calculateDamage);
            
            // 下一回合按钮
            document.getElementById('next-turn-btn').addEventListener('click', handleNextTurn);
            
            // 实时计算事件监听器
            // 我方个体值相关
            document.getElementById('my-iv-attr1').addEventListener('change', function() { updateIvAttributeOptions(); calculateRealTimeAttributes(); });
            document.getElementById('my-iv-attr2').addEventListener('change', function() { updateIvAttributeOptions(); calculateRealTimeAttributes(); });
            document.getElementById('my-iv-attr3').addEventListener('change', function() { updateIvAttributeOptions(); calculateRealTimeAttributes(); });
            document.getElementById('my-iv-value1').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('my-iv-value2').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('my-iv-value3').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('my-boost').addEventListener('change', function() { updateBoostReductionOptions('my'); calculateRealTimeAttributes(); });
            document.getElementById('my-reduction').addEventListener('change', function() { updateBoostReductionOptions('my'); calculateRealTimeAttributes(); });
            
            // 敌方个体值相关
            document.getElementById('enemy-iv-attr1').addEventListener('change', function() { updateIvAttributeOptions(); calculateRealTimeAttributes(); });
            document.getElementById('enemy-iv-attr2').addEventListener('change', function() { updateIvAttributeOptions(); calculateRealTimeAttributes(); });

            document.getElementById('enemy-iv-value1').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('enemy-iv-value2').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('enemy-iv-value3').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('enemy-boost').addEventListener('change', function() { updateBoostReductionOptions('enemy'); calculateRealTimeAttributes(); });
            document.getElementById('enemy-reduction').addEventListener('change', function() { updateBoostReductionOptions('enemy'); calculateRealTimeAttributes(); });

            // 我方能力等级相关
            document.getElementById('my-phys-atk-boost').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('my-magic-atk-boost').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('my-phys-def-boost').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('my-magic-def-boost').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('my-speed-boost').addEventListener('input', calculateRealTimeAttributes);

            // 敌方能力等级相关
            document.getElementById('enemy-phys-atk-boost').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('enemy-magic-atk-boost').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('enemy-phys-def-boost').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('enemy-magic-def-boost').addEventListener('input', calculateRealTimeAttributes);
            document.getElementById('enemy-speed-boost').addEventListener('input', calculateRealTimeAttributes);

            document.getElementById('my-reselect-skills').addEventListener('click', function() {
                if (myPet) {
                    openSkillConfigModal(myPet, 'my');
                }
            });
            
            document.getElementById('enemy-reselect-skills').addEventListener('click', function() {
                if (enemyPet) {
                    openSkillConfigModal(enemyPet, 'enemy');
                }
            });
            
            // 初始化互斥逻辑
            updateIvAttributeOptions();
            updateBoostReductionOptions('my');
            updateBoostReductionOptions('enemy');
        }
        
        // 加载宠物技能
        function loadPetSkills(petId, side) {
            const skills = side === 'my' ? mySkills : enemySkills;
            
            const skillsDiv = document.getElementById(`${side}-skills`);
            skillsDiv.innerHTML = '';
            
            // 设置2x2网格布局
            skillsDiv.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3';
            
            skills.forEach(skill => {
                // 计算弱点倍率
                let multiplier = 1;
                if ((side === 'my' && enemyPet) || (side === 'enemy' && myPet)) {
                    const attackAttr = skill.attr_id;
                    const defendPet = side === 'my' ? enemyPet : myPet;
                    const defendAttr1 = defendPet.attr1;
                    const defendAttr2 = defendPet.attr2;
                    
                    if (defendAttr2) {
                        // 双属性
                        const m1 = getMultiplier(attackAttr, defendAttr1);
                        const m2 = getMultiplier(attackAttr, defendAttr2);
                        
                        if (m1 === 2.0 && m2 === 2.0) {
                            multiplier = 3.0;
                        } else if (m1 === 0.5 && m2 === 0.5) {
                            multiplier = 1 / 3;
                        } else {
                            multiplier = m1 * m2;
                        }
                    } else {
                        // 单属性
                        multiplier = getMultiplier(attackAttr, defendAttr1);
                    }
                }
                
                // 获取箭头图标
                const arrowIcon = getWeaknessArrow(multiplier);
                
                const skillDiv = document.createElement('div');
                skillDiv.className = 'p-2 border border-gray-200 rounded-md hover:bg-gray-50 cursor-pointer';
                skillDiv.innerHTML = `
                    <div class="font-medium">${skill.name}</div>
                    <div class="text-sm text-gray-600">威力: ${skill.power} | 属性: ${attrMap[skill.attr_id]} ${arrowIcon}</div>
                    <div class="text-xs text-gray-500">${skill.desc}</div>
                    ${skill.can_hit === 1 ? `<div class="mt-2">
                        <label class="block text-xs font-medium text-gray-700 mb-1">额外连击次数</label>
                        <input type="number" class="w-full p-1 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" min="0" value="0" data-skill-id="${skill.skill_id}">
                    </div>` : ''}
                `;
                skillDiv.addEventListener('click', function() {
                    if (side === 'my') {
                        mySelectedSkill = skill;
                    } else {
                        enemySelectedSkill = skill;
                    }
                    // 高亮选中的技能
                    const skillDivs = skillsDiv.querySelectorAll('div');
                    skillDivs.forEach(div => div.classList.remove('bg-blue-50', 'border-blue-300'));
                    skillDiv.classList.add('bg-blue-50', 'border-blue-300');
                });
                
                // 为额外连击输入字段添加验证
                if (skill.can_hit === 1) {
                    const comboInput = skillDiv.querySelector('input[data-skill-id]');
                    if (comboInput) {
                        comboInput.addEventListener('input', function() {
                            validateComboInput(this);
                        });
                    }
                }
                
                skillsDiv.appendChild(skillDiv);
            });
        }
        
        // 计算伤害
        async function calculateDamage() {
            if (!myPet || !enemyPet || !mySelectedSkill || !enemySelectedSkill) {
                alert('请选择宠物和技能');
                return;
            }
            
            // 获取修正值
            // 存储基础属性（用于伤害计算）
            let myBaseAttrs = {};
            let enemyBaseAttrs = {};

            const myIv = getIvObject('my');
            const myBoostAttr = document.getElementById('my-boost').value;
            const myReductionAttr = document.getElementById('my-reduction').value;
            const enemyIv = getIvObject('enemy');
            const enemyBoostAttr = document.getElementById('enemy-boost').value;
            const enemyReductionAttr = document.getElementById('enemy-reduction').value;

        // 根据血量百分比获取背景色类名
        function getHpBarColorClass(current, initial) {
            if (initial === 0) return 'bg-gray-100';
            
            const percentage = current / initial;
            
            if (percentage >= 0.6667) {
                return 'bg-green-100';
            } else if (percentage > 0.3333) {
                return 'bg-yellow-100';
            } else {
                return 'bg-red-100';
            }
        }
        
        // 显示计算后的属性
        function displayAttributes(side, attrs) {
            const attrDiv = document.getElementById(`${side}-attributes`);
            if (attrDiv) {
                // 初始化血量数据
                if (hpData[side].initial === 0) {
                    hpData[side].initial = attrs.hp;
                    hpData[side].current = attrs.hp;
                }
                
                const hpBarColorClass = getHpBarColorClass(hpData[side].current, hpData[side].initial);
                
                attrDiv.innerHTML = `
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div>HP: <span class="font-medium">${attrs.hp}</span></div>
                        <div>攻击: <span class="font-medium">${attrs.atk}</span></div>
                        <div>防御: <span class="font-medium">${attrs.def}</span></div>
                        <div>特攻: <span class="font-medium">${attrs.spa}</span></div>
                        <div>特防: <span class="font-medium">${attrs.spd}</span></div>
                        <div>速度: <span class="font-medium">${attrs.spe}</span></div>
                    </div>
                    <div class="mt-3 p-2 border border-gray-300 rounded-md ${hpBarColorClass} text-center transition-colors duration-300">
                        <span class="font-medium text-gray-800">${hpData[side].current}/${hpData[side].initial}</span>
                    </div>
                `;
                attrDiv.classList.remove('hidden');
            }
        }
        
        // 计算宠物属性
        function calculatePetAttributes(race, ivs, boostAttr, reductionAttr) {
            const attrs = {};
            
            // HP calculation
            let hpBoost = 0;
            let hpReduction = 0;
            if (boostAttr === 'hp') hpBoost = 0.2;
            if (reductionAttr === 'hp') hpReduction = 0.1;
            attrs.hp = Math.ceil((1.7 * race.hp + (ivs.hp || 0) * 0.85 * 6 + 70) * (1 + hpBoost - hpReduction) + 100);
            
            // Attack calculation
            let atkBoost = 0;
            let atkReduction = 0;
            if (boostAttr === 'atk') atkBoost = 0.2;
            if (reductionAttr === 'atk') atkReduction = 0.1;
            attrs.atk = Math.ceil((1.1 * race.atk + (ivs.atk || 0) * 0.55 * 6 + 10) * (1 + atkBoost - atkReduction) + 50);
            
            // Defense calculation
            let defBoost = 0;
            let defReduction = 0;
            if (boostAttr === 'def') defBoost = 0.2;
            if (reductionAttr === 'def') defReduction = 0.1;
            attrs.def = Math.ceil((1.1 * race.def + (ivs.def || 0) * 0.55 * 6 + 10) * (1 + defBoost - defReduction) + 50);
            
            // Special Attack calculation
            let spaBoost = 0;
            let spaReduction = 0;
            if (boostAttr === 'spa') spaBoost = 0.2;
            if (reductionAttr === 'spa') spaReduction = 0.1;
            attrs.spa = Math.ceil((1.1 * race.spa + (ivs.spa || 0) * 0.55 * 6 + 10) * (1 + spaBoost - spaReduction) + 50);
            
            // Special Defense calculation
            let spdBoost = 0;
            let spdReduction = 0;
            if (boostAttr === 'spd') spdBoost = 0.2;
            if (reductionAttr === 'spd') spdReduction = 0.1;
            attrs.spd = Math.ceil((1.1 * race.spd + (ivs.spd || 0) * 0.55 * 6 + 10) * (1 + spdBoost - spdReduction) + 50);
            
            // Speed calculation
            let speBoost = 0;
            let speReduction = 0;
            if (boostAttr === 'spe') speBoost = 0.2;
            if (reductionAttr === 'spe') speReduction = 0.1;
            attrs.spe = Math.ceil((1.1 * race.spe + (ivs.spe || 0) * 0.55 * 6 + 10) * (1 + speBoost - speReduction) + 50);
            
            return attrs;
        }
        
        // 计算克制关系
        function calculateWeakness(attackAttr, defendAttr1, defendAttr2) {
            return new Promise((resolve) => {
                fetch('/api/calculate/weakness', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        attack_attr: attackAttr.toString(),
                        defend_attr1: defendAttr1.toString(),
                        defend_attr2: defendAttr2 ? defendAttr2.toString() : '0'
                    })
                })
                .then(response => response.json())
                .then(data => {
                    resolve(data.multiplier);
                });
            });
        }
        
        // 计算战斗伤害
        function calculateBattleDamage(attackerAtk, defenderDef, defenderSpd, skillPower, skillType, weaknessMultiplier, responseMultiplier, powerBonus, powerBoost, damageReduction, weatherEffect, attackBoost=0, defenseReduction=0, attackReduction=0, defenseBoost=0) {
            return new Promise((resolve) => {
                fetch('/api/calculate/damage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        attacker_atk: attackerAtk,
                        defender_def: defenderDef,
                        defender_spd: defenderSpd,
                        skill_power: skillPower,
                        skill_type: skillType,
                        weakness_multiplier: weaknessMultiplier,
                        response_multiplier: responseMultiplier,
                        power_bonus: powerBonus,
                        power_boost: powerBoost,
                        damage_reduction: damageReduction,
                        weather_effect: weatherEffect,
                        attack_boost: attackBoost,
                        defense_reduction: defenseReduction,
                        attack_reduction: attackReduction,
                        defense_boost: defenseBoost
                    })
                })
                .then(response => response.json())
                .then(data => {
                    resolve(data.damage);
                });
            });
        }
        
        // 生成个体值下拉菜单选项
        function generateIvDropdownOptions() {
            const dropdowns = [
                'my-iv-dropdown1', 'my-iv-dropdown2', 'my-iv-dropdown3',
                'enemy-iv-dropdown1', 'enemy-iv-dropdown2', 'enemy-iv-dropdown3'
            ];
            
            dropdowns.forEach(dropdownId => {
                const contentId = dropdownId + '-content';

                if (content) {

                    for (let i = 0; i <= 10; i++) {
                        const div = document.createElement('div');
                        div.className = 'p-1 hover:bg-gray-100 cursor-pointer text-center';
                        div.textContent = i;
                        div.onclick = function() {
                            const valueId = dropdownId.replace('dropdown', 'value');
                            selectIvValue(valueId, i, dropdownId);
                        };
                        content.appendChild(div);
                    }
                }
            });
        }
        
        // 切换个体值下拉菜单（带智能定位）
        function toggleIvDropdown(dropdownId) {
            // 关闭所有其他下拉菜单
            const allDropdowns = document.querySelectorAll('[id$="-dropdown1"], [id$="-dropdown2"], [id$="-dropdown3"]');
            allDropdowns.forEach(dropdown => {
                if (dropdown.id !== dropdownId) {
                    dropdown.classList.add('hidden');
                }
            });
            
            // 切换当前下拉菜单
            const dropdown = document.getElementById(dropdownId);
            const isHidden = dropdown.classList.contains('hidden');
            
            if (isHidden) {
                // 计算智能定位
                const button = dropdown.previousElementSibling;
                const buttonRect = button.getBoundingClientRect();
                const dropdownHeight = 260; // 约11项 * 高度 + padding
                const viewportHeight = window.innerHeight;
                const viewportWidth = window.innerWidth;
                
                // 重置所有定位类
                dropdown.classList.remove('dropdown-up', 'dropdown-left');
                dropdown.style.left = '';
                dropdown.style.right = '';
                
                // 下方空间不足，向上展开
                if (buttonRect.bottom + dropdownHeight > viewportHeight - 20) {
                    dropdown.classList.add('dropdown-up');
                }
                
                // 右侧空间不足，向左对齐
                if (buttonRect.left + dropdown.offsetWidth > viewportWidth - 20) {
                    dropdown.classList.add('dropdown-left');
                }
            }
            
            dropdown.classList.toggle('hidden');
        }

        // 验证额外连击输入

        // 获取属性克制倍率
        function getMultiplier(attackAttr, defendAttr) {
            // 转换为字符串以匹配属性映射
            attackAttr = String(attackAttr);
            defendAttr = String(defendAttr);
            
            if (multiplierData && multiplierData[attackAttr] && multiplierData[attackAttr][defendAttr]) {
                return multiplierData[attackAttr][defendAttr];
            }
            return 1.0;

        // 更新个体值属性选项（互斥逻辑）
        function updateIvAttributeOptions() {
            const sides = ['my', 'enemy'];
            sides.forEach(side => {
                const currentSelects = [
                    document.getElementById(`${side}-iv-attr1`),
                    document.getElementById(`${side}-iv-attr2`),
                    document.getElementById(`${side}-iv-attr3`)
                ];
                
                // 获取当前选中的值
                const selectedValues = currentSelects.map(select => select.value);
                
                // 获取所有已选择的属性
                const usedValues = selectedValues.filter(v => v !== null && v !== undefined);
                
                // 更新每个选择器的选项
                currentSelects.forEach((currentSelect, currentIndex) => {
                    const options = currentSelect.options;
                    const currentValue = currentSelect.value;
                    
                    // 遍历所有选项
                    for (let i = 0; i < options.length; i++) {
                        const optionValue = options[i].value;
                        
                        // 检查该选项是否被其他选择器使用
                        const isUsedByOther = usedValues.some((selected, idx) => 
                            idx !== currentIndex && selected === optionValue
                        );
                        
                        // 如果被其他选择器使用且不是当前选择器的值，则禁用
                        options[i].disabled = isUsedByOther && optionValue !== currentValue;
                    }
                });
            });
        }
        
        // 更新增益/减益选项（互斥逻辑）
        function updateBoostReductionOptions(side) {
            const boostSelect = document.getElementById(`${side}-boost`);
            const reductionSelect = document.getElementById(`${side}-reduction`);
            
            const boostValue = boostSelect.value;
            const reductionValue = reductionSelect.value;
            
            // 遍历reduction选项
            for (let i = 0; i < reductionSelect.options.length; i++) {
                const optionValue = reductionSelect.options[i].value;
                // 如果boost选择了某个属性（非"无"），则在reduction中禁用该属性
                if (optionValue !== "0" && optionValue === boostValue) {
                    reductionSelect.options[i].disabled = true;
                } else {
                    reductionSelect.options[i].disabled = false;
                }
            }
            
            // 遍历boost选项
            for (let i = 0; i < boostSelect.options.length; i++) {
                const optionValue = boostSelect.options[i].value;
                // 如果reduction选择了某个属性（非"无"），则在boost中禁用该属性
                if (optionValue !== "0" && optionValue === reductionValue) {
                    boostSelect.options[i].disabled = true;
                } else {
                    boostSelect.options[i].disabled = false;
                }
            }
        }
        
        // 获取个体值对象
        function getIvObject(side) {
            const ivs = {};
            for (let i = 1; i <= 3; i++) {
                const attr = document.getElementById(`${side}-iv-attr${i}`).value;
                const value = parseInt(document.getElementById(`${side}-iv-value${i}`).textContent) || 0;
                ivs[attr] = (ivs[attr] || 0) + value;
            }
            return ivs;
        }
