<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对战模拟器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        accent: '#f59e0b',
                        danger: '#ef4444',
                    },
                }
            }
        }
    </script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/skill-config.js"></script>
    <script src="/static/js/ui-utils.js"></script>
    <script src="/static/js/damage-calculator.js"></script>
    <script src="/static/js/event-handlers.js"></script>
    <script src="/static/js/pet-filter.js"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .dropdown-up {
                position: absolute;
                bottom: 100%;
                top: auto;
                margin-top: 0;
                margin-bottom: 4px;
            }
            .dropdown-left {
                left: auto;
                right: 0;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">对战模拟器</h1>
        
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- 左侧：我方精灵信息 -->
            <div class="w-full lg:w-[28.57%] bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">我方精灵</h2>
                
                <div class="mb-6">
                    <h3 class="text-lg font-medium text-gray-600 mb-2">宠物选择</h3>
                    <div class="flex gap-2">
                        <button type="button" id="my-pet-filter-btn" class="flex-1 bg-primary text-white px-3 py-2 rounded-md hover:bg-blue-600 transition-colors">
                            选择宠物
                        </button>
                    </div>
                    <div id="my-pet-info" class="mt-4 p-3 bg-gray-50 rounded-md hidden">
                        <h4 class="font-medium text-gray-700"></h4>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <div>属性1: <span id="my-attr1"></span></div>
                            <div>属性2: <span id="my-attr2"></span></div>
                            <div>HP: <span id="my-hp"></span></div>
                            <div>攻击: <span id="my-atk"></span></div>
                            <div>防御: <span id="my-def"></span></div>
                            <div>特攻: <span id="my-spa"></span></div>
                            <div>特防: <span id="my-spd"></span></div>
                            <div>速度: <span id="my-spe"></span></div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-200">
                            <h5 class="font-medium text-gray-700 mb-2">计算后属性</h5>
                            <div id="my-attributes" class="hidden"></div>
                        </div>
                    </div>
                </div>
                
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-lg font-medium text-gray-600">技能选择</h3>
                        <button type="button" id="my-reselect-skills" class="text-sm text-primary hover:underline">
                            重新选择
                        </button>
                    </div>
                    <div id="my-skills"></div>
                </div>
                
                <div>
                    <h3 class="text-lg font-medium text-gray-600 mb-2">修正系统</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">增益修正</label>
                            <select id="my-boost" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="0">无</option>
                                <option value="hp">HP</option>
                                <option value="atk">攻击</option>
                                <option value="def">防御</option>
                                <option value="spa">特攻</option>
                                <option value="spd">特防</option>
                                <option value="spe">速度</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">减益修正</label>
                            <select id="my-reduction" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="0">无</option>
                                <option value="hp">HP</option>
                                <option value="atk">攻击</option>
                                <option value="def">防御</option>
                                <option value="spa">特攻</option>
                                <option value="spd">特防</option>
                                <option value="spe">速度</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">个体值选择</label>
                            <div class="space-y-2">
                                <div class="flex items-center gap-2">
                                    <select id="my-iv-attr1" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="hp">HP</option>
                                        <option value="atk">攻击</option>
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('my-iv-dropdown1')">
                                                <span id="my-iv-value1">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="my-iv-dropdown1" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="my-iv-dropdown1-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select id="my-iv-attr2" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="atk">攻击</option>
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                        <option value="hp">HP</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('my-iv-dropdown2')">
                                                <span id="my-iv-value2">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="my-iv-dropdown2" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="my-iv-dropdown2-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select id="my-iv-attr3" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                        <option value="hp">HP</option>
                                        <option value="atk">攻击</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('my-iv-dropdown3')">
                                                <span id="my-iv-value3">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="my-iv-dropdown3" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="my-iv-dropdown3-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 中间：战斗计算和结果显示 -->
            <div class="w-full lg:w-[42.86%] bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">战斗计算</h2>

                <div class="grid grid-cols-2 gap-6 mb-6">
                    <!-- 我方战斗参数 -->
                    <div>
                        <h3 class="text-lg font-medium text-primary mb-3">我方参数</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">应对倍率</label>
                                <input type="number" id="my-response-multiplier" min="0" step="0.1" value="1" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">威力加成（数值）</label>
                                <input type="number" id="my-power-bonus" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">威力提升（百分比）</label>
                                <input type="number" id="my-power-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">减伤</label>
                                <input type="number" id="my-damage-reduction" min="0" max="1" step="0.1" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">天气影响</label>
                                <input type="number" id="my-weather-effect" min="0" step="0.1" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            </div>
                        </div>
                    </div>

                    <!-- 敌方战斗参数 -->
                    <div>
                        <h3 class="text-lg font-medium text-danger mb-3">敌方参数</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">应对倍率</label>
                                <input type="number" id="enemy-response-multiplier" min="0" step="0.1" value="1" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">威力加成（数值）</label>
                                <input type="number" id="enemy-power-bonus" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">威力提升（百分比）</label>
                                <input type="number" id="enemy-power-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">减伤</label>
                                <input type="number" id="enemy-damage-reduction" min="0" max="1" step="0.1" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">天气影响</label>
                                <input type="number" id="enemy-weather-effect" min="0" step="0.1" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 能力等级设置 -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium text-gray-600 mb-3">能力等级</h3>
                    <div class="grid grid-cols-2 gap-6">
                        <!-- 我方能力等级 -->
                        <div>
                            <h4 class="text-sm font-medium text-primary mb-2">我方能力提升</h4>
                            <div class="space-y-2">
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">物理攻击 (±%)</label>
                                    <input type="number" id="my-phys-atk-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">魔法攻击 (±%)</label>
                                    <input type="number" id="my-magic-atk-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">物理防御 (±%)</label>
                                    <input type="number" id="my-phys-def-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">魔法防御 (±%)</label>
                                    <input type="number" id="my-magic-def-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">速度 (±%)</label>
                                    <input type="number" id="my-speed-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                </div>
                            </div>
                        </div>

                        <!-- 敌方能力等级 -->
                        <div>
                            <h4 class="text-sm font-medium text-danger mb-2">敌方能力提升</h4>
                            <div class="space-y-2">
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">物理攻击 (±%)</label>
                                    <input type="number" id="enemy-phys-atk-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">魔法攻击 (±%)</label>
                                    <input type="number" id="enemy-magic-atk-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">物理防御 (±%)</label>
                                    <input type="number" id="enemy-phys-def-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">魔法防御 (±%)</label>
                                    <input type="number" id="enemy-magic-def-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-600 mb-1">速度 (±%)</label>
                                    <input type="number" id="enemy-speed-boost" step="0.01" value="0" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-danger">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-center mb-6">
                    <button id="calculate-btn" class="bg-primary text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors">计算伤害</button>
                </div>
                
                <h2 class="text-xl font-semibold text-gray-700 mb-4">计算结果</h2>
                
                <div id="result" class="p-4 bg-gray-50 rounded-md hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <h3 class="font-medium text-gray-700 mb-2">我方攻击敌方</h3>
                            <div class="space-y-2">
                                <div>技能: <span id="my-skill-name"></span></div>
                                <div>伤害: <span id="my-damage" class="font-bold text-primary"></span></div>
                                <div>需要攻击次数: <span id="my-hit-count" class="font-bold text-primary"></span></div>
                            </div>
                        </div>
                        <div>
                            <h3 class="font-medium text-gray-700 mb-2">敌方攻击我方</h3>
                            <div class="space-y-2">
                                <div>技能: <span id="enemy-skill-name"></span></div>
                                <div>伤害: <span id="enemy-damage" class="font-bold text-danger"></span></div>
                                <div>需要攻击次数: <span id="enemy-hit-count" class="font-bold text-danger"></span></div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-center">
                        <button id="next-turn-btn" class="bg-accent text-white px-6 py-2 rounded-md hover:bg-amber-600 transition-colors">下一回合</button>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：敌方精灵信息 -->
            <div class="w-full lg:w-[28.57%] bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">敌方精灵</h2>
                
                <div class="mb-6">
                    <h3 class="text-lg font-medium text-gray-600 mb-2">宠物选择</h3>
                    <div class="flex gap-2">
                        <button type="button" id="enemy-pet-filter-btn" class="flex-1 bg-danger text-white px-3 py-2 rounded-md hover:bg-red-600 transition-colors">
                            选择宠物
                        </button>
                    </div>
                    <div id="enemy-pet-info" class="mt-4 p-3 bg-gray-50 rounded-md hidden">
                        <h4 class="font-medium text-gray-700"></h4>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <div>属性1: <span id="enemy-attr1"></span></div>
                            <div>属性2: <span id="enemy-attr2"></span></div>
                            <div>HP: <span id="enemy-hp"></span></div>
                            <div>攻击: <span id="enemy-atk"></span></div>
                            <div>防御: <span id="enemy-def"></span></div>
                            <div>特攻: <span id="enemy-spa"></span></div>
                            <div>特防: <span id="enemy-spd"></span></div>
                            <div>速度: <span id="enemy-spe"></span></div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-200">
                            <h5 class="font-medium text-gray-700 mb-2">计算后属性</h5>
                            <div id="enemy-attributes" class="hidden"></div>
                        </div>
                    </div>
                </div>
                
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-lg font-medium text-gray-600">技能选择</h3>
                        <button type="button" id="enemy-reselect-skills" class="text-sm text-primary hover:underline">
                            重新选择
                        </button>
                    </div>
                    <div id="enemy-skills"></div>
                </div>
                
                <div>
                    <h3 class="text-lg font-medium text-gray-600 mb-2">修正系统</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">增益修正</label>
                            <select id="enemy-boost" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="0">无</option>
                                <option value="hp">HP</option>
                                <option value="atk">攻击</option>
                                <option value="def">防御</option>
                                <option value="spa">特攻</option>
                                <option value="spd">特防</option>
                                <option value="spe">速度</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">减益修正</label>
                            <select id="enemy-reduction" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="0">无</option>
                                <option value="hp">HP</option>
                                <option value="atk">攻击</option>
                                <option value="def">防御</option>
                                <option value="spa">特攻</option>
                                <option value="spd">特防</option>
                                <option value="spe">速度</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">个体值选择</label>
                            <div class="space-y-2">
                                <div class="flex items-center gap-2">
                                    <select id="enemy-iv-attr1" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="hp">HP</option>
                                        <option value="atk">攻击</option>
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('enemy-iv-dropdown1')">
                                                <span id="enemy-iv-value1">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="enemy-iv-dropdown1" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="enemy-iv-dropdown1-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select id="enemy-iv-attr2" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="atk">攻击</option>
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                        <option value="hp">HP</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('enemy-iv-dropdown2')">
                                                <span id="enemy-iv-value2">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="enemy-iv-dropdown2" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="enemy-iv-dropdown2-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select id="enemy-iv-attr3" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                        <option value="def">防御</option>
                                        <option value="spa">特攻</option>
                                        <option value="spd">特防</option>
                                        <option value="spe">速度</option>
                                        <option value="hp">HP</option>
                                        <option value="atk">攻击</option>
                                    </select>
                                    <div class="w-20">
                                        <div class="relative">
                                            <button type="button" class="w-full p-1 border border-gray-300 rounded-md hover:bg-gray-100 flex items-center justify-between" onclick="toggleIvDropdown('enemy-iv-dropdown3')">
                                                <span id="enemy-iv-value3">0</span>
                                                <span class="text-xs">▼</span>
                                            </button>
                                            <div id="enemy-iv-dropdown3" class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-md mt-1 hidden">
                                                <div class="max-h-40 overflow-y-auto" id="enemy-iv-dropdown3-content">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 技能配置模态框 -->
    <div id="skill-config-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">
                    <span id="skill-config-side">我方</span>宠物技能配置
                </h2>
                <button id="close-skill-config-modal" class="text-gray-500 hover:text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-4 flex flex-col h-[calc(90vh-120px)]">
                <div class="flex flex-col md:flex-row gap-4 flex-1 overflow-hidden">
                    <!-- 技能筛选 -->
                    <div class="w-full md:w-1/4 p-4 border rounded-md">
                        <h3 class="font-medium text-gray-700 mb-3">技能筛选</h3>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">技能类型</label>
                                <select id="skill-type-filter" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                    <option value="0">全部</option>
                                    <option value="1">物理</option>
                                    <option value="2">魔法</option>
                                    <option value="3">防御</option>
                                    <option value="4">状态</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">威力范围: <span id="power-range-value">0-250</span></label>
                                <input type="range" id="skill-power-filter" min="0" max="250" value="250" class="w-full">
                            </div>
                        </div>
                    </div>
                    
                    <!-- 技能列表 -->
                    <div class="w-full md:w-2/4 p-4 border rounded-md overflow-y-auto">
                        <h3 class="font-medium text-gray-700 mb-3">可选技能</h3>
                        <div id="skill-list-container" class="space-y-3">
                            <!-- 技能卡片将通过JS动态生成 -->
                        </div>
                    </div>
                    
                    <!-- 已选技能 -->
                    <div class="w-full md:w-1/4 p-4 border rounded-md overflow-y-auto">
                        <h3 class="font-medium text-gray-700 mb-3">已选技能</h3>
                        <div id="selected-skills-container" class="grid grid-cols-1 gap-3">
                            <!-- 已选技能卡片将通过JS动态生成 -->
                        </div>
                    </div>
                </div>
                
                <div class="mt-4 flex justify-end">
                    <button id="confirm-skills-btn" class="bg-primary text-white px-6 py-2 rounded-md hover:bg-blue-600 transition-colors">
                        确认选择
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 宠物过滤模态框 -->
    <div id="pet-filter-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-5xl max-h-[90vh] overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">
                    选择<span id="filter-side-label">我方</span>宠物
                </h2>
                <button id="close-pet-filter-modal" class="text-gray-500 hover:text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-4 flex flex-col h-[calc(90vh-120px)]">
                <!-- 过滤条件 -->
                <div class="p-4 border rounded-md mb-4">
                    <h3 class="font-medium text-gray-700 mb-3">属性过滤</h3>
                    <div id="attr-filter-container" class="flex flex-wrap gap-2">
                        <!-- 属性过滤按钮将通过JS动态生成 -->
                    </div>
                </div>
                
                <!-- 宠物列表和分页 -->
                <div class="flex-1 overflow-hidden flex flex-col">
                    <div class="mb-2 flex justify-between items-center">
                        <div>共 <span id="filter-result-count">0</span> 只宠物</div>
                        <div class="flex items-center gap-2">
                            <button id="filter-prev-btn" class="px-3 py-1 border border-gray-300 rounded-md hover:bg-gray-100">上一页</button>
                            <span>第 <span id="filter-current-page">1</span>/<span id="filter-total-pages">1</span> 页</span>
                            <button id="filter-next-btn" class="px-3 py-1 border border-gray-300 rounded-md hover:bg-gray-100">下一页</button>
                        </div>
                    </div>
                    <div id="pet-filter-list" class="flex-1 overflow-y-auto border rounded-md p-4 space-y-3">
                        <!-- 宠物卡片将通过JS动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
